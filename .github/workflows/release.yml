name: Release

# Runs whenever a SemVer-shaped tag is pushed (e.g. `1.2.3` or `1.2.3-beta.1`).
# Drafts a GitHub Release, extracts that version's section from CHANGELOG.md
# for the body, and marks pre-release tags accordingly.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'        # 1.2.3
      - '[0-9]+.[0-9]+.[0-9]+-*'      # 1.2.3-beta.1, 1.2.3-rc.2, …

permissions:
  contents: write   # required by softprops/action-gh-release to create releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Decide pre-release flag
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract this version's CHANGELOG section
        id: notes
        run: |
          version="${GITHUB_REF_NAME}"
          file="CHANGELOG.md"
          if [[ ! -f "$file" ]]; then
            echo "No CHANGELOG.md found; release notes will be auto-generated."
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull everything between `## [<version>]` and the next `## [` heading.
          notes="$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/    { exit }
            capture                { print }
          ' "$file")"

          if [[ -z "${notes// /}" ]]; then
            echo "No section for $version in CHANGELOG.md; falling back to auto-generated notes."
            echo "body=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "$notes"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.body == '' }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          draft: false
          fail_on_unmatched_files: false
